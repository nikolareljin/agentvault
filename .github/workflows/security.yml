name: Security

on:
  pull_request:
    branches: [main, "release/*"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

jobs:
  go-scan:
    uses: nikolareljin/ci-helpers/.github/workflows/go-scan.yml@production
    with:
      go_version: "1.24"
      # G204/G304/G301/G306/G117 are high-noise for this CLI/TUI repository
      # where many file paths and executable names are user-provided by design.
      gosec_args: "-exclude=G104,G204,G304,G301,G306,G117 ./..."

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Required for pull_request commit-range scans used by gitleaks-action.
          fetch-depth: 0

      - name: Gitleaks scan
        uses: ./.github/actions/gitleaks-scan
        with:
          scan_path: "."
          fail_on_findings: false
