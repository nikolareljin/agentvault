name: PR

on:
  pull_request:
    branches: [main, "release/*"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"

concurrency:
  group: pr-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  gate:
    uses: nikolareljin/ci-helpers/.github/workflows/pr-gate.yml@production
    with:
      go_version: "1.24"
      lint_command: 'test -z "$(gofmt -l .)" && go vet ./...'
      test_command: "go test ./..."
      build_command: "go build ./..."
      # Release tag validation is handled by .github/workflows/release-tag-gate.yml.
      # Keeping this disabled avoids a missing local-action path in ci-helpers pr-gate.
      check_release_tag: false
      release_branch: ${{ github.head_ref }}
