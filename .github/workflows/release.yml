name: Release

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag to build and release (e.g. 0.12.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    uses: nikolareljin/ci-helpers/.github/workflows/go-release.yml@production
    with:
      go_version: "1.24"
      bin_name: agentvault
      build_targets: "linux/amd64,linux/arm64,darwin/amd64,darwin/arm64,windows/amd64"
      ldflags: >-
        -s -w
        -X github.com/nikolareljin/agentvault/cmd.Version=${{ github.event.inputs.release_tag || github.ref_name }}
        -X github.com/nikolareljin/agentvault/cmd.Commit=${{ github.sha }}
      release_tag: ${{ github.event.inputs.release_tag || github.ref_name }}
      generate_release_notes: true
