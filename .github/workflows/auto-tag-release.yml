name: Auto Tag Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Detect and tag release
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const { owner, repo } = context.repo;
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner, repo, commit_sha: sha,
            });
            const merged = prs.data.find(
              (pr) => pr.merged_at && pr.base.ref === "main"
            );
            if (!merged) return;
            const match = merged.head.ref.match(/^release\/(\d+\.\d+\.\d+(?:-rc\d+)?)$/);
            if (!match) return;
            const version = match[1];
            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${version}` });
              core.info(`Tag ${version} already exists`);
              return;
            } catch (e) {
              if (e.status !== 404) throw e;
            }
            await github.rest.git.createRef({
              owner, repo,
              ref: `refs/tags/${version}`,
              sha: context.sha,
            });
            core.info(`Created tag ${version}`);
